# Atmosfera Echo Hub ESPHome configuration.
# Keep this file as the readable entry point: identity, key tunables and package wiring only.

substitutions:
  # Device identity
  device_name: atmosfera-echo-hub
  name: atmosfera-echo-hub
  friendly_name: "Atmosfera Echo Hub"
  project_namespace: kyvaith
  firmware_version: dev

  # Home Assistant entities used by the default tile pages
  tile_light_entity: light.living_room
  tile_switch_entity: switch.living_room
  tile_scene_entity: scene.relax
  tile_trigger_entity: button.doorbell
  tile_cover_entity: cover.living_room
  tile_garage_entity: cover.garage_door
  tile_lock_entity: lock.front_door
  tile_climate_entity: climate.living_room
  tile_media_entity: media_player.music_assistant
  tile_fan_entity: fan.living_room
  tile_alarm_entity: alarm_control_panel.home
  speaker_group_sensor: sensor.speaker_group

  # Home Assistant artwork download behavior
  ha_verify_ssl: "true"
  allow_insecure_local_artwork: "true"
  firmware_manifest_url: "https://kyvaith.github.io/atmosfera-echo-hub/manifest.json"
  firmware_manifest_beta_url: "https://kyvaith.github.io/atmosfera-echo-hub/manifest-beta.json"
  dashboard_import_url: github://kyvaith/atmosfera-echo-hub/atmosfera-echo-hub.yaml@main

  # Display and touch tuning
  display_width: "800"
  display_height: "800"
  display_brightness_default: "85"
  display_timeout_default: "60"
  display_update_interval: 16ms
  display_buffer_size: 100%
  display_byte_order: little_endian
  display_pclk_frequency: 60MHz
  touch_update_interval: 16ms
  backlight_pwm_frequency: 20000Hz

  # Artwork and playback behavior
  image_byte_order: little_endian
  artwork_size: "800"
  artwork_image_buffer_size: "65536"
  playback_progress_bar_range: "100"
  playback_refresh_interval: 1s
  track_info_duration_default: "5"
  voice_language_default: en-US
  voice_region_default: auto
  wake_word_default: hey_atmosfera
  voice_assistant_default: home_assistant

packages:
  external_components: !include modules/common/external_components.yaml
  core: !include modules/common/core.yaml
  managed_updates: !include modules/common/managed_updates.yaml
  system_settings: !include modules/common/system_settings.yaml
  performance_diagnostics: !include modules/diagnostics/performance.yaml

  esp32_p4_hardware: !include modules/hardware/esp32_p4.yaml
  display_hardware: !include modules/hardware/display.yaml
  touchscreen_hardware: !include modules/hardware/touchscreen.yaml
  audio_hardware: !include modules/hardware/audio.yaml

  lvgl_runtime: !include modules/lvgl/base.yaml
  lvgl_fonts: !include modules/lvgl/fonts.yaml
  lvgl_navigation: !include modules/lvgl/navigation.yaml
  lvgl_boot_page: !include modules/lvgl/pages/boot.yaml
  lvgl_tiles_page: !include modules/lvgl/pages/tiles.yaml
  lvgl_settings_page: !include modules/lvgl/pages/settings.yaml
  lvgl_player_page: !include modules/lvgl/pages/player.yaml

  player_settings: !include modules/player/settings.yaml
  player_artwork: !include modules/player/artwork.yaml
  player_runtime: !include modules/player/runtime.yaml
  player_speaker_grouping: !include modules/player/speaker_grouping.yaml
