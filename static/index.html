<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Install Atmosfera Echo Hub</title>
    <meta name="description" content="Install Atmosfera Echo Hub firmware.">
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #05070c;
        color: #f4effa;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(520px, 100%);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        line-height: 1.1;
      }

      p {
        margin: 0 0 28px;
        color: #aeb4c2;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Install Atmosfera Echo Hub</h1>
      <p>Connect the device over USB and install the latest factory firmware.</p>
      <esp-web-install-button manifest="manifest.json"></esp-web-install-button>
    </main>
    <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
  </body>
</html>
