# Local wake word and Home Assistant voice pipeline.
# The onboard microphones are routed through the ES7210 ADC. GPIO11 is the
# ES7210 SDOUT1/TDMOUT line; ES8311 remains output-only for the speaker path.
substitutions:
  voice_assist_idle_phase_id: "1"
  voice_assist_waiting_phase_id: "2"
  voice_assist_listening_phase_id: "3"
  voice_assist_thinking_phase_id: "4"
  voice_assist_replying_phase_id: "5"
  voice_assist_timer_finished_phase_id: "6"
  voice_assist_not_ready_phase_id: "10"
  voice_assist_error_phase_id: "11"

globals:
  - id: init_in_progress
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: voice_assistant_phase
    type: int
    restore_value: no
    initial_value: ${voice_assist_not_ready_phase_id}
  - id: first_active_timer
    type: voice_assistant::Timer
    restore_value: false
  - id: is_timer_active
    type: bool
    restore_value: false
  - id: voice_assistant_paused_media
    type: bool
    restore_value: false
    initial_value: 'false'

microphone:
  - platform: i2s_audio
    id: onboard_microphone
    adc_type: external
    i2s_audio_id: audio_bus
    i2s_din_pin: GPIO11
    sample_rate: 48000
    bits_per_sample: 16bit
    channel: stereo
    pdm: false
    correct_dc_offset: true

  - platform: resampler
    id: voice_microphone
    microphone:
      microphone: onboard_microphone
      channels: 1
    sample_rate: 16000
    buffer_duration: 500ms

micro_wake_word:
  id: wake_word_engine
  ring_buffer_duration: 500ms
  vad:
  microphone:
    microphone: voice_microphone
    channels: 0
    gain_factor: 4
  models:
    # The custom assets in assets/microwakewords are openWakeWord-style float
    # models ([1,16,96]) and are not compatible with ESPHome microWakeWord's
    # int8 streaming preprocessor ([1,stride,40]). Use known-good local
    # microWakeWord models until the custom phrases are retrained.
    - id: okay_nabu
      model: okay_nabu
    - id: hey_jarvis
      model: hey_jarvis
  stop_after_detection: false
  on_wake_word_detected:
    then:
      - if:
          condition:
            switch.is_off: voice_assistant_mute_switch
          then:
            - if:
                condition:
                  switch.is_on: timer_ringing
                then:
                  - switch.turn_off: timer_ringing
                else:
                  - if:
                      condition:
                        voice_assistant.is_running:
                      then:
                        - voice_assistant.stop:
                      else:
                        - script.execute: display_wake
                        - if:
                            condition:
                              media_player.is_playing: local_music_player
                            then:
                              - globals.set:
                                  id: voice_assistant_paused_media
                                  value: 'true'
                              - media_player.pause: local_music_player
                              - delay: 300ms
                            else:
                              - globals.set:
                                  id: voice_assistant_paused_media
                                  value: 'false'
                        - lambda: |-
                            id(voice_assistant_phase) = ${voice_assist_waiting_phase_id};
                            id(voice_assistant_request_text).publish_state("");
                            id(voice_assistant_response_text).publish_state("");
                        - script.execute: voice_assistant_update_overlay
                        - micro_wake_word.stop:
                        - voice_assistant.start:
                            wake_word: !lambda return wake_word;

switch:
  - platform: template
    id: voice_assistant_mute_switch
    name: "Voice Assistant Mute"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:microphone-off"
    on_turn_on:
      - micro_wake_word.stop:
      - voice_assistant.stop:
      - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
      - script.execute: voice_assistant_update_overlay
      - script.execute: ui_update_voice_mute_state
    on_turn_off:
      - if:
          condition:
            voice_assistant.connected:
          then:
            - micro_wake_word.start:
            - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
            - script.execute: voice_assistant_update_overlay
      - script.execute: ui_update_voice_mute_state

  - platform: template
    id: voice_assistant_wake_sound_switch
    name: "Voice Assistant Wake Sound"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    icon: "mdi:music-note"
    on_turn_on:
      - script.execute: ui_update_wake_sound_state
    on_turn_off:
      - script.execute: ui_update_wake_sound_state

  - platform: template
    id: timer_ringing
    internal: true
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: id(voice_assistant_phase) = ${voice_assist_timer_finished_phase_id};
      - text_sensor.template.publish:
          id: voice_assistant_response_text
          state: "Timer finished"
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0ms
      - script.execute: voice_assistant_update_overlay
      - delay: 15min
      - switch.turn_off: timer_ringing
    on_turn_off:
      - if:
          condition:
            media_player.is_announcing: local_music_player
          then:
            - media_player.stop:
                id: local_music_player
                announcement: true
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 0
          duration: 1s
      - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
      - script.execute: voice_assistant_update_overlay

select:
  - platform: template
    id: mww_sensitivity_select
    name: "Wake Word Sensitivity"
    optimistic: true
    initial_option: Slightly sensitive
    restore_value: true
    entity_category: config
    icon: "mdi:waveform"
    options:
      - Slightly sensitive
      - Moderately sensitive
      - Very sensitive
    on_value:
      - lambda: |-
          if (x == "Slightly sensitive") {
            id(okay_nabu).set_probability_cutoff(217);
            id(hey_jarvis).set_probability_cutoff(247);
          } else if (x == "Moderately sensitive") {
            id(okay_nabu).set_probability_cutoff(176);
            id(hey_jarvis).set_probability_cutoff(235);
          } else if (x == "Very sensitive") {
            id(okay_nabu).set_probability_cutoff(143);
            id(hey_jarvis).set_probability_cutoff(212);
          }
      - script.execute: ui_update_wake_sensitivity_state

text_sensor:
  - platform: template
    id: voice_assistant_request_text
    internal: true
    on_value:
      - script.execute: voice_assistant_update_overlay
  - platform: template
    id: voice_assistant_response_text
    internal: true
    on_value:
      - script.execute: voice_assistant_update_overlay

voice_assistant:
  id: va
  microphone:
    microphone: voice_microphone
    channels: 0
  micro_wake_word: wake_word_engine
  media_player: local_music_player
  use_wake_word: false
  noise_suppression_level: 0
  auto_gain: 0dBFS
  volume_multiplier: 1.0
  conversation_timeout: 300s
  on_client_connected:
    - lambda: |-
        id(init_in_progress) = false;
        id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - if:
        condition:
          switch.is_off: voice_assistant_mute_switch
        then:
          - micro_wake_word.start:
    - script.execute: voice_assistant_update_overlay
  on_client_disconnected:
    - voice_assistant.stop:
    - micro_wake_word.stop:
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: voice_assistant_update_overlay
  on_error:
    - if:
        condition:
          and:
            - lambda: return !id(init_in_progress);
            - lambda: return code != "duplicate_wake_up_detected";
        then:
          - lambda: |-
              id(voice_assistant_phase) = ${voice_assist_error_phase_id};
              id(voice_assistant_response_text).publish_state(message);
          - script.execute: voice_assistant_update_overlay
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 0
        duration: 1s
  on_start:
    - micro_wake_word.stop:
    - if:
        condition:
          media_player.is_playing: local_music_player
        then:
          - globals.set:
              id: voice_assistant_paused_media
              value: 'true'
          - media_player.pause: local_music_player
          - delay: 300ms
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 20
        duration: 0ms
    - script.execute: display_wake
    - script.execute: voice_assistant_update_overlay
  on_listening:
    - lambda: |-
        id(voice_assistant_phase) = ${voice_assist_waiting_phase_id};
        id(voice_assistant_request_text).publish_state("...");
        id(voice_assistant_response_text).publish_state("");
    - script.execute: voice_assistant_update_overlay
  on_stt_vad_start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
    - script.execute: voice_assistant_update_overlay
  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    # The onboard ES7210 mic and ES8311 DAC share ESPHome's I2S parent bus.
    # Release wake-word RX before the TTS speaker tries to own TX.
    - micro_wake_word.stop:
    - script.execute: voice_assistant_update_overlay
  on_stt_end:
    - text_sensor.template.publish:
        id: voice_assistant_request_text
        state: !lambda return x;
    - micro_wake_word.stop:
  on_intent_progress:
    - if:
        condition:
          lambda: return !x.empty();
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          - micro_wake_word.stop:
          - script.execute: voice_assistant_update_overlay
  on_tts_start:
    - text_sensor.template.publish:
        id: voice_assistant_response_text
        state: !lambda return x;
    - micro_wake_word.stop:
    - if:
        condition:
          lambda: return id(voice_assistant_phase) != ${voice_assist_replying_phase_id};
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          - script.execute: voice_assistant_update_overlay
  on_tts_end:
    - script.execute: voice_assistant_update_overlay
  on_end:
    - wait_until:
        not:
          voice_assistant.is_running:
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 0
        duration: 1s
    - wait_until:
        condition:
          not:
            media_player.is_announcing: local_music_player
        timeout: 2s
    - if:
        condition:
          lambda: return id(voice_assistant_phase) == ${voice_assist_error_phase_id};
        then:
          - delay: 1s
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: voice_assistant_update_overlay
    - if:
        condition:
          and:
            - voice_assistant.connected:
            - switch.is_off: voice_assistant_mute_switch
        then:
          - delay: 250ms
          - micro_wake_word.start:
    - if:
        condition:
          lambda: return id(voice_assistant_paused_media);
        then:
          - media_player.play: local_music_player
          - globals.set:
              id: voice_assistant_paused_media
              value: 'false'
  on_timer_started:
    - script.execute: check_if_timers_active
    - script.execute: voice_assistant_update_overlay
  on_timer_updated:
    - script.execute: fetch_first_active_timer
    - script.execute: voice_assistant_update_overlay
  on_timer_cancelled:
    - script.execute: check_if_timers_active
    - script.execute: voice_assistant_update_overlay
  on_timer_finished:
    - switch.turn_on: timer_ringing
  on_timer_tick:
    - script.execute: voice_assistant_update_overlay

script:
  - id: fetch_first_active_timer
    then:
      - lambda: |-
          const auto timers = id(va).get_timers();
          if (timers.empty()) {
            id(is_timer_active) = false;
            return;
          }
          auto output_timer = *timers.begin();
          for (const auto &timer : timers) {
            if (timer.is_active && timer.seconds_left <= output_timer.seconds_left) {
              output_timer = timer;
            }
          }
          id(first_active_timer) = output_timer;
          id(is_timer_active) = true;

  - id: check_if_timers_active
    then:
      - lambda: |-
          const auto timers = id(va).get_timers();
          bool active = false;
          for (const auto &timer : timers) {
            if (timer.is_active) {
              active = true;
              break;
            }
          }
          id(is_timer_active) = active;

  - id: voice_assistant_update_overlay
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              const int phase = id(voice_assistant_phase);
              return phase != ${voice_assist_idle_phase_id} && phase != ${voice_assist_not_ready_phase_id};
          then:
            - lvgl.widget.show: voice_assistant_overlay
            - lambda: |-
                if (id(voice_assistant_overlay) != nullptr) {
                  lv_obj_move_foreground(id(voice_assistant_overlay));
                }
                if (id(perf_overlay_label) != nullptr && id(settings_perf_overlay_switch).state) {
                  lv_obj_move_foreground(id(perf_overlay_label));
                }
          else:
            - lvgl.widget.hide: voice_assistant_overlay
      - lambda: |-
          const int phase = id(voice_assistant_phase);
          const bool visible = phase != ${voice_assist_idle_phase_id} && phase != ${voice_assist_not_ready_phase_id};

          const char *status = "Assistant";
          uint32_t accent = 0x8CEED1;
          if (phase == ${voice_assist_waiting_phase_id}) {
            status = "Listening";
            accent = 0xA8F4DF;
          } else if (phase == ${voice_assist_listening_phase_id}) {
            status = "Listening";
            accent = 0xC7F5FF;
          } else if (phase == ${voice_assist_thinking_phase_id}) {
            status = "Thinking";
            accent = 0xEADDFF;
          } else if (phase == ${voice_assist_replying_phase_id}) {
            status = "Speaking";
            accent = 0xFFDDB8;
          } else if (phase == ${voice_assist_timer_finished_phase_id}) {
            status = "Timer";
            accent = 0xFFD7E4;
          } else if (phase == ${voice_assist_error_phase_id}) {
            status = "Error";
            accent = 0xFFB4AB;
          }

          if (id(voice_assistant_status_label) != nullptr) {
            lv_label_set_text(id(voice_assistant_status_label), status);
            lv_obj_set_style_text_color(id(voice_assistant_status_label), lv_color_hex(accent), 0);
          }
          if (id(voice_assistant_orb_shell) != nullptr) {
            lv_obj_set_style_border_color(id(voice_assistant_orb_shell), lv_color_hex(accent), 0);
            lv_obj_set_style_shadow_color(id(voice_assistant_orb_shell), lv_color_hex(accent), 0);
          }
          if (id(voice_assistant_you_label) != nullptr) {
            const std::string request = id(voice_assistant_request_text).state;
            lv_label_set_text(id(voice_assistant_you_label), request.empty() ? "" : request.c_str());
          }
          if (id(voice_assistant_response_label) != nullptr) {
            const std::string response = id(voice_assistant_response_text).state;
            lv_label_set_text(id(voice_assistant_response_label), response.empty() ? "" : response.c_str());
          }
          if (id(voice_assistant_lottie) != nullptr) {
            auto *ctx = static_cast<esphome::lvgl::LottieContext *>(lv_obj_get_user_data(id(voice_assistant_lottie)));
            if (visible) {
              if (ctx == nullptr) {
                lv_obj_clear_flag(id(voice_assistant_lottie), LV_OBJ_FLAG_HIDDEN);
              } else {
                esphome::lvgl::lottie_show(ctx, true);
              }
            } else {
              esphome::lvgl::lottie_hide(ctx);
            }
          }
