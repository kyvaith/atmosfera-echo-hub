# LVGL renderer configuration.
# Page definitions are split into modules/lvgl/pages so the renderer settings stay easy to scan.
lvgl:
  displays:
    - my_display
  touchscreens:
    - my_touchscreen
  update_interval: ${display_update_interval}
  buffer_size: ${display_buffer_size}
  draw_rounding: ${display_draw_rounding}
  direct_mode: false
  full_refresh: false
  byte_order: ${display_byte_order}
  bg_color: 0x05070C
  fps_benchmark: true
  # We expose FPS/CPU through our own settings-controlled HUD; keep LVGL's
  # native sysmon disabled so it does not add another always-on overlay/timer.
  perf_monitor: false
  color_depth: 32
  use_ppa: ${lvgl_use_ppa}
  use_ppa_img: ${lvgl_use_ppa_img}
  profiler: ${lvgl_profiler_enabled}
  default_font: roboto_14
  text_font: roboto_24
