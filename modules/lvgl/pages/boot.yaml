# Boot splash shown while the UI finishes warming up.
# The backlight is enabled only after this page is ready, so users see a polished fade-in.
script:
  - id: boot_show_esphome_animation
    mode: restart
    then:
      - lambda: |-
          if (id(boot_esphome_animation) != nullptr) {
            auto *ctx = static_cast<esphome::lvgl::LottieContext *>(lv_obj_get_user_data(id(boot_esphome_animation)));
            esphome::lvgl::lottie_show(ctx, true);
          }

  - id: boot_hide_esphome_animation
    mode: restart
    then:
      - lambda: |-
          if (id(boot_esphome_animation) != nullptr) {
            auto *ctx = static_cast<esphome::lvgl::LottieContext *>(lv_obj_get_user_data(id(boot_esphome_animation)));
            esphome::lvgl::lottie_hide(ctx);
          }

lvgl:
  pages:
    - id: boot_page
      bg_color: 0x05070C
      widgets:
        - lottie:
            id: boot_esphome_animation
            file: "assets/animations/ESPHome.json"
            width: 240
            height: 305
            align: CENTER
            y: -64
            loop: false
            auto_start: true
            hidden: true
        - label:
            text: "Atmosfera Echo Hub"
            align: CENTER
            y: 198
            width: 480
            text_align: CENTER
            text_color: 0xF4EFFA
            text_font: roboto_24
