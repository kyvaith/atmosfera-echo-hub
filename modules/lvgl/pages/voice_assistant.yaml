# Voice Assistant overlay.
# It lives on LVGL top_layer so it can appear above tiles, player and settings without changing pages.
lvgl:
    top_layer:
        widgets:
          - obj:
                id: voice_assistant_overlay
                x: 0
                y: 0
                width: 800
                height: 800
                bg_color: 0x5070c
                bg_opa: 100%
                border_width: 0
                radius: 0
                pad_all: 0
                scrollable: false
                clickable: true
                hidden: true
                widgets:
                  - button:
                        id: voice_assistant_close_button
                        align: TOP_RIGHT
                        x: -78
                        y: 58
                        width: 66
                        height: 66
                        radius: 33
                        bg_color: 0x1b1f2a
                        border_width: 1
                        border_color: 0x343b4c
                        scrollable: false
                        widgets:
                          - label:
                                text: ""
                                align: CENTER
                                text_color: 0xf4effa
                                text_font: material_symbols_24
                        on_click:
                            then:
                              - script.execute: ui_close_app
                  - obj:
                        id: voice_assistant_orb_shell
                        width: 270
                        height: 270
                        align: CENTER
                        y: -145
                        bg_color: 0x162725
                        bg_opa: 100%
                        border_width: 3
                        border_color: 0x8ceed1
                        radius: 135
                        pad_all: 0
                        scrollable: false
                        shadow_width: 0
                        shadow_color: 0x8ceed1
                        shadow_opa: 0%
                        widgets:
                          - lottie:
                                id: voice_assistant_lottie
                                file: "assets/animations/voice_assistant.json"
                                width: 240
                                height: 240
                                align: CENTER
                                loop: true
                                auto_start: true
                                hidden: true
                  - label:
                        id: voice_assistant_status_label
                        text: "Assistant"
                        align: CENTER
                        y: 14
                        width: 560
                        text_align: CENTER
                        text_color: 0x8ceed1
                        text_font: roboto_34
                  - label:
                        text: "You"
                        align: CENTER
                        x: -220
                        y: 108
                        width: 120
                        text_align: LEFT
                        text_color: 0xaeb4c2
                        text_font: roboto_16
                  - label:
                        id: voice_assistant_you_label
                        text: ""
                        align: CENTER
                        y: 140
                        width: 560
                        height: 74
                        text_align: CENTER
                        text_color: 0xf4effa
                        text_font: roboto_20
                        long_mode: WRAP
                  - label:
                        text: "Assistant"
                        align: CENTER
                        x: -196
                        y: 242
                        width: 160
                        text_align: LEFT
                        text_color: 0xaeb4c2
                        text_font: roboto_16
                  - label:
                        id: voice_assistant_response_label
                        text: ""
                        align: CENTER
                        y: 276
                        width: 580
                        height: 118
                        text_align: CENTER
                        text_color: 0xffffff
                        text_font: roboto_24
                        long_mode: WRAP
