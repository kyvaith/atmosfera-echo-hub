# Main tile pages.
# These four WearOS-inspired pages are the home surface for Home Assistant controls.
lvgl:
  pages:
    - id: controls_page
      bg_color: 0x05070C
      widgets:
        - obj:
            id: controls_root_1
            width: 800
            height: 800
            align: CENTER
            x: 0
            bg_color: 0x05070C
            border_width: 0
            radius: 0
            pad_all: 0
            scrollable: false
            widgets:
              - obj:
                  width: 760
                  height: 760
                  align: CENTER
                  bg_color: 0x10131B
                  border_width: 1
                  border_color: 0x2A3344
                  radius: 0
                  pad_all: 0
                  scrollable: false
                  gesture_bubble: true
              - label:
                  text: "Room"
                  align: TOP_MID
                  y: 54
                  width: 520
                  text_align: CENTER
                  text_color: 0xF4EFFA
                  text_font: roboto_24
              - label:
                  text: "1 of 4"
                  align: TOP_MID
                  y: 88
                  width: 140
                  text_align: CENTER
                  bg_color: 0x1B1F2A
                  bg_opa: 100%
                  radius: 16
                  pad_top: 4
                  pad_bottom: 4
                  text_color: 0xAEB4C2
                  text_font: roboto_16
              - button:
                  id: tile_light_button
                  x: 86
                  y: 140
                  width: 300
                  height: 150
                  radius: 68
                  bg_color: 0x382D55
                  border_width: 1
                  border_color: 0x6D5D9A
                  scrollable: false
                  gesture_bubble: true
                  widgets:
                    - label:
                        text: "Light"
                        align: TOP_MID
                        y: 32
                        text_color: 0xFFFFFF
                        text_font: roboto_24
                    - label:
                        text: "Toggle"
                        align: BOTTOM_MID
                        y: -32
                        text_color: 0xEADDFF
                        text_font: roboto_18
                  on_click:
                    then:
                      - homeassistant.action:
                          action: light.toggle
                          variables:
                            target: !lambda 'return id(tile_light_entity_text).state;'
                          data_template:
                            entity_id: "{{ target }}"
              - button:
