# Music player page.
# Artwork, transport controls, volume overlay and speaker grouping are rendered here for the round display.
lvgl:
  pages:
    - id: music_page
      bg_color: 0x05070C
      widgets:
        - canvas:
            id: lottie_canvas_dependency
            width: 1
            height: 1
            x: -10
            y: -10
        - obj:
            id: wear_root
            width: 800
            height: 800
            align: CENTER
            bg_color: 0x05070C
            border_width: 0
            radius: 0
            pad_all: 0
            scrollable: false
            widgets:
              - obj:
                  id: artwork_bg_panel
                  width: 800
                  height: 800
                  align: CENTER
                  bg_color: 0x10131B
                  border_width: 0
                  radius: 0
                  pad_all: 0
                  scrollable: false
                  gesture_bubble: true

              - image:
                  id: album_art_background_widget
                  x: 0
                  y: 0
                  width: 800
                  height: 800
                  src: album_art_background
                  opa: 100%
                  hidden: true

              - obj:
                  id: artwork_scrim
                  x: 0
                  y: 0
                  width: 800
                  height: 800
                  bg_color: 0x000000
                  bg_opa: 100%
                  border_width: 0
                  radius: 0
                  pad_all: 0
                  scrollable: false
                  clickable: false

              - label:
                  id: artwork_error_label
                  text: "Artwork unavailable"
                  align: CENTER
                  y: -24
                  width: 420
                  height: 42
                  text_font: roboto_18
                  text_color: 0xAEB4C2
                  text_align: CENTER
                  hidden: true

              - obj:
                  id: top_status_pill
                  width: 300
                  height: 54
                  align: TOP_LEFT
                  x: 84
                  y: 34
                  bg_color: 0x1B1F2A
                  border_width: 1
                  border_color: 0x343B4C
                  radius: 27
                  pad_all: 0
                  scrollable: false
                  gesture_bubble: true
                  widgets:
                    - label:
                        id: top_status_label
                        text: "Music Assistant"
                        align: CENTER
                        text_color: 0xEADDFF
                        text_font: roboto_18

              - button:
                  id: speaker_group_button
                  width: 190
                  height: 54
                  align: TOP_RIGHT
                  x: -84
                  y: 34
                  bg_color: 0x1B1F2A
                  border_width: 1
                  border_color: 0x343B4C
                  radius: 27
                  pad_all: 0
                  scrollable: false
                  gesture_bubble: true
                  widgets:
                    - label:
                        text: "Speakers"
                        align: CENTER
                        text_color: 0xEADDFF
                        text_font: roboto_18
                  on_click:
                    then:
                      - script.execute: open_speaker_group_panel

              - obj:
                  id: lottie_visual_zone
                  width: 190
                  height: 130
                  align: CENTER
                  y: -98
                  bg_color: 0x000000
                  bg_opa: 100%
                  border_width: 0
                  radius: 65
                  pad_all: 0
                  scrollable: false
                  gesture_bubble: true
                  widgets:
                    - lottie:
                        id: weather_animation
                        file: "assets/animations/weather.json"
                        x: 31
                        y: 1
                        width: 128
                        height: 128

              - label:
                  id: title_label
                  text: "No Track"
                  align: TOP_MID
                  y: 180
                  width: 560
                  long_mode: WRAP
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: roboto_34

              - label:
                  id: artist_label
                  text: "-"
                  align: TOP_MID
                  y: 304
                  width: 520
                  long_mode: DOT
                  text_align: CENTER
                  text_color: 0xE4E0F0
                  text_font: roboto_24

              - label:
                  id: album_label
                  text: ""
                  align: TOP_MID
                  y: 352
                  width: 500
                  long_mode: DOT
                  text_align: CENTER
                  text_color: 0xAEB4C2
                  text_font: roboto_18

              - label:
                  id: media_time_label
                  text: "0:00 / 0:00"
                  align: TOP_MID
                  y: 404
                  width: 360
                  text_align: CENTER
                  text_color: 0xE4E0F0
                  text_opa: 100%
                  text_font: roboto_18

              - bar:
                  id: media_progress_bar
                  align: BOTTOM_MID
                  y: 0
                  width: 800
                  height: 8
                  min_value: 0
                  max_value: 100
                  value: 0
                  bg_color: 0x000000
                  bg_opa: 100%
                  radius: 0
                  indicator:
                    bg_color: 0xFFFFFF
                    radius: 0

              - button:
                  id: vol_down_button
                  align: LEFT_MID
                  x: 44
                  y: 128
                  width: 90
                  height: 116
                  radius: 45
                  bg_color: 0x1B1F2A
                  border_width: 1
                  border_color: 0x343B4C
                  scrollable: false
                  gesture_bubble: true
                  widgets:
                    - label:
                        text: "-"
                        align: CENTER
                        text_color: 0xF4EFFA
                        text_font: roboto_36
                  on_click:
                    then:
                      - script.execute:
                          id: main_volume_step
                          direction: -1

              - button:
                  id: vol_up_button
                  align: RIGHT_MID
                  x: -44
                  y: 128
                  width: 90
                  height: 116
                  radius: 45
                  bg_color: 0x1B1F2A
                  border_width: 1
                  border_color: 0x343B4C
                  scrollable: false
                  gesture_bubble: true
                  widgets:
                    - label:
                        text: "+"
                        align: CENTER
                        text_color: 0xF4EFFA
                        text_font: roboto_36
                  on_click:
                    then:
                      - script.execute:
                          id: main_volume_step
                          direction: 1

              - button:
                  id: prev_button
                  align: BOTTOM_LEFT
                  x: 104
                  y: -96
                  width: 104
                  height: 104
                  radius: 52
                  bg_color: 0x1B1F2A
                  border_width: 1
                  border_color: 0x343B4C
                  scrollable: false
                  gesture_bubble: true
                  widgets:
                    - label:
                        text: "\uE045"
                        align: CENTER
                        text_color: 0xF4EFFA
                        text_font: material_symbols_30
                  on_click:
                    then:
                      - homeassistant.service:
                          service: media_player.media_previous_track
                          variables:
                            target: !lambda 'return id(media_player_entity).state;'
                          data_template:
                            entity_id: "{{ target }}"

              - button:
                  id: next_button
                  align: BOTTOM_LEFT
                  x: 230
                  y: -96
                  width: 104
                  height: 104
                  radius: 52
                  bg_color: 0x1B1F2A
                  border_width: 1
                  border_color: 0x343B4C
                  scrollable: false
                  gesture_bubble: true
                  widgets:
                    - label:
                        text: "\uE044"
                        align: CENTER
                        text_color: 0xF4EFFA
                        text_font: material_symbols_30
                  on_click:
                    then:
                      - homeassistant.service:
                          service: media_player.media_next_track
                          variables:
                            target: !lambda 'return id(media_player_entity).state;'
                          data_template:
                            entity_id: "{{ target }}"

              - button:
                  id: play_button
                  align: BOTTOM_RIGHT
                  x: -92
                  y: -86
                  width: 136
                  height: 136
                  radius: 68
                  bg_color: 0xD7C2FF
                  border_width: 0
                  scrollable: false
                  gesture_bubble: true
                  widgets:
                    - label:
                        id: play_icon_label
                        text: "\uE037"
                        align: CENTER
                        text_color: 0x211433
                        text_font: material_symbols_36
                  on_click:
                    then:
                      - homeassistant.service:
                          service: media_player.media_play_pause
                          variables:
                            target: !lambda 'return id(media_player_entity).state;'
                          data_template:
                            entity_id: "{{ target }}"

              - obj:
                  id: volume_overlay
                  x: 0
                  y: 0
                  width: 800
                  height: 800
                  bg_color: 0x05070C
                  bg_opa: 100%
                  border_width: 0
                  radius: 0
                  pad_all: 0
                  scrollable: false
                  hidden: true
                  widgets:
                    - arc:
                        id: volume_arc
                        align: CENTER
                        y: 18
                        width: 570
                        height: 570
                        min_value: 0
                        max_value: 100
                        value: 50
                        adjustable: true
                        arc_color: 0x343B4C
                        arc_width: 30
                        arc_rounded: true
                        indicator:
                          arc_color: 0xD7C2FF
                          arc_width: 30
                          arc_rounded: true
                        knob:
                          bg_color: 0xFFFFFF
                          radius: 21
                          width: 42
                          height: 42
                          border_width: 0
                        on_value:
                          - lvgl.label.update:
                              id: volume_pct_label
                              text: !lambda |-
                                char buf[8];
                                snprintf(buf, sizeof(buf), "%d%%", (int)x);
                                return std::string(buf);
                          - if:
                              condition:
                                lambda: 'return !id(volume_updating_from_ha);'
                              then:
                                - lambda: |-
                                    id(volume_pending_pct) = (int)(x + 0.5f);
                                    id(volume_pending_until) = millis() + 1500;
                                - homeassistant.service:
                                    service: media_player.volume_set
                                    variables:
                                      target: !lambda 'return id(media_player_entity).state;'
                                      vol_level: !lambda 'return x / 100.0f;'
                                    data_template:
                                      entity_id: "{{ target }}"
                                      volume_level: "{{ vol_level }}"
                                - script.execute: show_volume_overlay
                    - label:
                        id: volume_title_label
                        text: "Volume"
