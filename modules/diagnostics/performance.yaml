# Optional performance HUD.
# The interval is cheap when disabled and gives FPS/CPU/flush data during UI tuning.
interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id:
            - perf_overlay_label
          text: !lambda |-
            if (!id(settings_perf_overlay_switch).state) {
              lv_obj_add_flag(id(perf_overlay_label), LV_OBJ_FLAG_HIDDEN);
              return std::string("");
            }
            lv_obj_clear_flag(id(perf_overlay_label), LV_OBJ_FLAG_HIDDEN);
            char buf[72];
            snprintf(buf, sizeof(buf), "FPS %lu CPU %lu%% FL %lu/%lums L%lums I%luk D%lu",
                     (unsigned long) lvgl_esphome_get_fps(),
                     (unsigned long) lvgl_esphome_get_cpu_pct(),
                     (unsigned long) lvgl_esphome_get_flush_ms(),
                     (unsigned long) lvgl_esphome_get_flush_max_ms(),
                     (unsigned long) lvgl_esphome_get_loop_max_ms(),
                     (unsigned long) lvgl_esphome_get_invalidated_kpx(),
                     (unsigned long) lvgl_esphome_get_direct_mode_active());
            return std::string(buf);
