# Touch controller and gesture bridge.
# The touch callbacks translate GT911 events into the custom page-swipe and app-close gestures.
touchscreen:
  - platform: gt911
    id: my_touchscreen
    i2c_id: touchscreen_bus
    display: my_display
    update_interval: ${touch_update_interval}
    on_touch:
      then:
        - lambda: |-
            if (id(touch_tracking)) {
              return;
            }
            id(touch_tracking) = true;
            id(touch_dragging) = false;
            id(touch_swipe_committed) = false;
            id(touch_snapshot_active) = false;
            id(touch_drag_page) = 0;
            id(touch_drag_dir) = 0;
            id(touch_last_render_ms) = 0;
            id(touch_start_x) = touch.x;
            id(touch_start_y) = touch.y;
            id(touch_last_x) = touch.x;
            id(touch_last_y) = touch.y;

            const uint32_t now = millis();
            id(display_last_interaction_ms) = now;
            if (id(boot_sequence_done) && !id(display_awake)) {
              id(display_wake).execute();
            }
    on_update:
      then:
        - lambda: |-
            const uint32_t perf_start_us = micros();
            if (!id(touch_tracking) || touches.empty()) {
              return;
            }
            const auto &touch = touches[0];
            id(touch_last_x) = touch.x;
            id(touch_last_y) = touch.y;

            const int dx = id(touch_last_x) - id(touch_start_x);
            const int dy = id(touch_last_y) - id(touch_start_y);
            const int abs_dx = abs(dx);
            const int abs_dy = abs(dy);
            const bool horizontal_drag = id(ui_page) >= 1 && id(ui_page) <= 4 && abs_dx > 18 && abs_dx > abs_dy;
            const bool player_close_drag = id(ui_page) == 0 && !id(media_speaker_panel_open) && dy < -18 && abs_dy > abs_dx;
            const bool settings_close_drag = false;
            const uint32_t now = millis();
            auto log_slow_update = [&](const char *action) {
              if (!id(settings_perf_logs_switch).state) return;
              const uint32_t elapsed_us = micros() - perf_start_us;
              if (elapsed_us >= 3000) {
                ESP_LOGW("touch.perf", "update action=%s page=%d dx=%d dy=%d elapsed=%uus snapshot=%d",
                         action, id(ui_page), dx, dy, elapsed_us, id(touch_snapshot_active));
              }
            };

            if (horizontal_drag) {
              int page_dx = dx < -800 ? -800 : (dx > 800 ? 800 : dx);
              int drag_dir = page_dx < 0 ? 1 : (page_dx > 0 ? -1 : 0);
              int drag_page = id(ui_page);
              int neighbor_page = drag_page + drag_dir;
              if (drag_dir == 0 || neighbor_page < 1 || neighbor_page > 4) {
                return;
              }
              if (!id(touch_dragging)) {
                id(touch_dragging) = true;
                id(touch_drag_page) = drag_page;
                id(touch_drag_dir) = drag_dir;
                lv_indev_wait_release(lv_indev_active());

                lv_obj_add_flag(id(controls_root_1), LV_OBJ_FLAG_HIDDEN);
                lv_obj_add_flag(id(controls_root_2), LV_OBJ_FLAG_HIDDEN);
                lv_obj_add_flag(id(controls_root_3), LV_OBJ_FLAG_HIDDEN);
                lv_obj_add_flag(id(controls_root_4), LV_OBJ_FLAG_HIDDEN);
                if (drag_page == 1 || neighbor_page == 1) lv_obj_clear_flag(id(controls_root_1), LV_OBJ_FLAG_HIDDEN);
                if (drag_page == 2 || neighbor_page == 2) lv_obj_clear_flag(id(controls_root_2), LV_OBJ_FLAG_HIDDEN);
                if (drag_page == 3 || neighbor_page == 3) lv_obj_clear_flag(id(controls_root_3), LV_OBJ_FLAG_HIDDEN);
                if (drag_page == 4 || neighbor_page == 4) lv_obj_clear_flag(id(controls_root_4), LV_OBJ_FLAG_HIDDEN);

                lv_obj_t *current_root = drag_page == 1 ? id(controls_root_1) :
                                         drag_page == 2 ? id(controls_root_2) :
                                         drag_page == 3 ? id(controls_root_3) : id(controls_root_4);
                lv_obj_t *neighbor_root = neighbor_page == 1 ? id(controls_root_1) :
                                          neighbor_page == 2 ? id(controls_root_2) :
                                          neighbor_page == 3 ? id(controls_root_3) : id(controls_root_4);
                id(touch_snapshot_active) =
                    lvgl_esphome_snapshot_swipe_begin(current_root, neighbor_root, 800, drag_dir * 800);
              } else {
                drag_page = id(touch_drag_page);
                drag_dir = id(touch_drag_dir);
                neighbor_page = drag_page + drag_dir;
              }
              if (id(touch_last_render_ms) != 0 && now - id(touch_last_render_ms) < 16) {
                return;
              }
              id(touch_last_render_ms) = now;
              page_dx = dx < -800 ? -800 : (dx > 800 ? 800 : dx);
              if (drag_dir == 1 && page_dx > 0) {
                page_dx = 0;
              } else if (drag_dir == -1 && page_dx < 0) {
                page_dx = 0;
              }
              const int neighbor_x = (drag_dir * 800) + page_dx;
              if (id(touch_snapshot_active)) {
                lvgl_esphome_snapshot_swipe_update(page_dx, neighbor_x);
              } else {
                if (drag_page == 1) lv_obj_set_x(id(controls_root_1), page_dx);
                if (drag_page == 2) lv_obj_set_x(id(controls_root_2), page_dx);
                if (drag_page == 3) lv_obj_set_x(id(controls_root_3), page_dx);
                if (drag_page == 4) lv_obj_set_x(id(controls_root_4), page_dx);
                if (neighbor_page == 1) lv_obj_set_x(id(controls_root_1), neighbor_x);
                if (neighbor_page == 2) lv_obj_set_x(id(controls_root_2), neighbor_x);
                if (neighbor_page == 3) lv_obj_set_x(id(controls_root_3), neighbor_x);
                if (neighbor_page == 4) lv_obj_set_x(id(controls_root_4), neighbor_x);
              }
              log_slow_update("tile_swipe");
            } else if (player_close_drag) {
              if (!id(touch_dragging)) {
                id(touch_dragging) = true;
                lv_indev_wait_release(lv_indev_active());
              }
              if (id(touch_last_render_ms) != 0 && now - id(touch_last_render_ms) < 16) {
                return;
              }
              id(touch_last_render_ms) = now;
              lv_obj_set_y(id(wear_root), dy);
              log_slow_update("player_close");
            } else if (settings_close_drag) {
              if (!id(touch_dragging)) {
                id(touch_dragging) = true;
                lv_indev_wait_release(lv_indev_active());
              }
              if (id(touch_last_render_ms) != 0 && now - id(touch_last_render_ms) < 16) {
                return;
              }
              id(touch_last_render_ms) = now;
              lv_obj_set_y(id(settings_root), dy);
              log_slow_update("settings_close");
            }
    on_release:
      then:
        - lambda: |-
            const uint32_t perf_start_us = micros();
            if (!id(touch_tracking)) {
              if (id(settings_swipe_logs_switch).state) {
                ESP_LOGI("touch.debug", "touch release without active tracking");
              }
              return;
            }
            id(touch_tracking) = false;

            const int dx = id(touch_last_x) - id(touch_start_x);
            const int dy = id(touch_last_y) - id(touch_start_y);
            const int abs_dx = abs(dx);
            const int abs_dy = abs(dy);
            constexpr int commit_x = 200;
            constexpr int commit_y = 200;
            constexpr uint32_t swipe_cooldown_ms = 650;
            const uint32_t now = millis();

            const int release_drag_dir = id(touch_drag_dir);
            const bool committed_horizontal_drag =
                (release_drag_dir == 1 && dx < -commit_x) ||
                (release_drag_dir == -1 && dx > commit_x);
            bool changed_page = false;
            bool ran_tile_cleanup = false;

            auto cleanup_tile_drag = [&]() {
              if (ran_tile_cleanup) return;
              ran_tile_cleanup = true;
              const int offset = id(ui_page) >= 1 && id(ui_page) <= 4 ? -((id(ui_page) - 1) * 800) : 0;
              lv_obj_set_x(id(controls_root_1), offset);
              lv_obj_set_x(id(controls_root_2), offset + 800);
              lv_obj_set_x(id(controls_root_3), offset + 1600);
              lv_obj_set_x(id(controls_root_4), offset + 2400);
              lv_obj_add_flag(id(controls_root_1), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(controls_root_2), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(controls_root_3), LV_OBJ_FLAG_HIDDEN);
              lv_obj_add_flag(id(controls_root_4), LV_OBJ_FLAG_HIDDEN);
              if (id(ui_page) == 1) lv_obj_clear_flag(id(controls_root_1), LV_OBJ_FLAG_HIDDEN);
              if (id(ui_page) == 2) lv_obj_clear_flag(id(controls_root_2), LV_OBJ_FLAG_HIDDEN);
              if (id(ui_page) == 3) lv_obj_clear_flag(id(controls_root_3), LV_OBJ_FLAG_HIDDEN);
              if (id(ui_page) == 4) lv_obj_clear_flag(id(controls_root_4), LV_OBJ_FLAG_HIDDEN);
            };

            if (!id(touch_swipe_committed) && id(touch_dragging) && id(ui_page) >= 1 && id(ui_page) <= 4 &&
                now - id(touch_last_page_swipe_ms) > swipe_cooldown_ms && committed_horizontal_drag && abs_dx > abs_dy) {
              id(touch_swipe_committed) = true;
              id(touch_last_page_swipe_ms) = now;
              changed_page = true;
              id(ui_page) = id(ui_page) + release_drag_dir;
              if (id(touch_snapshot_active)) {
                lvgl_esphome_snapshot_swipe_finish(release_drag_dir == 1 ? -800 : 800, 0, 140, true);
              }
            } else if (id(touch_dragging) && id(ui_page) == 0 && dy < -commit_y && abs_dy > abs_dx) {
              id(ui_show_tiles_1_from_player).execute();
            } else if (false && id(touch_dragging) && id(ui_page) == 5 && dy < -commit_y && abs_dy > abs_dx) {
              id(ui_show_tiles_1_from_settings).execute();
            } else {
              if (id(ui_page) == 0) {
                lv_obj_set_y(id(wear_root), 0);
              }
              if (id(touch_snapshot_active)) {
                lvgl_esphome_snapshot_swipe_finish(0, release_drag_dir * 800, 140, false);
              } else if (id(touch_dragging) && id(touch_drag_page) >= 1 && id(touch_drag_page) <= 4) {
                cleanup_tile_drag();
              }
            }

            if (id(settings_perf_logs_switch).state) {
              const uint32_t elapsed_us = micros() - perf_start_us;
              if (elapsed_us >= 3000) {
                ESP_LOGW("touch.perf", "release page=%d dx=%d dy=%d elapsed=%uus drag=%d snapshot=%d tile_cleanup=%d",
                         id(ui_page), dx, dy, elapsed_us, id(touch_dragging), id(touch_snapshot_active), ran_tile_cleanup);
              }
            }

            id(touch_snapshot_active) = false;

            id(touch_dragging) = false;
            id(touch_drag_page) = 0;
            id(touch_drag_dir) = 0;
