# Touch controller.
# Home pages use lightweight swipe tracking here. The high-performance snapshot
# compositor is intentionally not part of the upstream-PR integration test build.
touchscreen:
  - platform: gt911
    id: my_touchscreen
    i2c_id: touchscreen_bus
    display: my_display
    update_interval: ${touch_update_interval}
    on_touch:
      then:
        - lambda: |-
            const uint32_t now = millis();
            id(display_last_interaction_ms) = now;
            if (id(boot_sequence_done) && !id(display_awake)) {
              id(display_wake).execute();
            }

            const int page = id(ui_page);
            id(tile_swipe_tracking) = page >= 1 && page <= 4;
            id(tile_swipe_dragging) = false;
            id(tile_swipe_page) = page;
            id(tile_swipe_next_page) = 0;
            id(tile_swipe_next_x) = 0;
            id(tile_swipe_commit_latched) = false;
            id(tile_swipe_start_x) = touch.x;
            id(tile_swipe_start_y) = touch.y;
            id(tile_swipe_last_x) = touch.x;
            id(tile_swipe_last_y) = touch.y;
            id(tile_swipe_last_render_ms) = 0;

    on_update:
      then:
        - lambda: |-
            if (touches.empty()) return;
            const auto &touch = touches[0];
            if (!id(tile_swipe_tracking)) return;

            id(tile_swipe_last_x) = touch.x;
            id(tile_swipe_last_y) = touch.y;

            const int page = id(tile_swipe_page);
            if (page < 1 || page > 4 || id(ui_page) != page) return;

            const int dx = id(tile_swipe_last_x) - id(tile_swipe_start_x);
            const int dy = id(tile_swipe_last_y) - id(tile_swipe_start_y);
            constexpr int width = 800;
            constexpr int commit_x = width / 4;
            if (abs(dx) < commit_x || abs(dx) <= abs(dy)) return;

            const int dir = dx < 0 ? 1 : -1;
            const int next_page = page + dir;
            if (next_page < 1 || next_page > 4) return;

            id(tile_swipe_dragging) = true;
            id(tile_swipe_next_page) = next_page;
            id(tile_swipe_next_x) = dir > 0 ? width : -width;
            id(tile_swipe_commit_latched) = true;
    on_release:
      then:
        - lambda: |-
            if (!id(tile_swipe_tracking)) {
              return;
            }
            id(tile_swipe_tracking) = false;
            const int page = id(tile_swipe_page);
            int next_page = id(tile_swipe_next_page);
            const int dx = id(tile_swipe_last_x) - id(tile_swipe_start_x);
            const int dy = id(tile_swipe_last_y) - id(tile_swipe_start_y);
            const int abs_dx = abs(dx);
            const int abs_dy = abs(dy);
            constexpr int width = 800;
            constexpr int commit_x = width / 4;

            if (next_page < 1 || next_page > 4) {
              const int dir = dx < 0 ? 1 : -1;
              next_page = page + dir;
            }

            const bool commit =
                (id(tile_swipe_commit_latched) || (abs_dx >= commit_x && abs_dx > abs_dy)) &&
                next_page >= 1 && next_page <= 4;

            if (commit) {
              id(ui_page) = next_page;
              id(ui_apply_tile_visibility).execute();
              if (id(settings_swipe_logs_switch).state) {
                ESP_LOGI("touch.swipe", "page=%d next=%d latched=%d dx=%d",
                         page, next_page, id(tile_swipe_commit_latched), dx);
              }
            }

            id(tile_swipe_dragging) = false;
            id(tile_swipe_page) = 0;
            id(tile_swipe_next_page) = 0;
            id(tile_swipe_next_x) = 0;
            id(tile_swipe_commit_latched) = false;
            id(tile_swipe_last_render_ms) = 0;
