# Touch controller.
# Home pages use the snapshot compositor so drag gestures move cached bitmaps
# while the live LVGL tree is updated only at rest.
touchscreen:
  - platform: gt911
    id: my_touchscreen
    i2c_id: touchscreen_bus
    display: my_display
    update_interval: ${touch_update_interval}
    on_touch:
      then:
        - lambda: |-
            const uint32_t now = millis();
            id(display_last_interaction_ms) = now;
            if (id(boot_sequence_done) && !id(display_awake)) {
              id(display_wake).execute();
            }

            const int page = id(ui_page);
            id(tile_swipe_tracking) = page >= 1 && page <= 4;
            id(tile_swipe_dragging) = false;
            id(tile_swipe_page) = page;
            id(tile_swipe_next_page) = 0;
            id(tile_swipe_next_x) = 0;
            id(tile_swipe_commit_latched) = false;
            id(tile_swipe_start_x) = touch.x;
            id(tile_swipe_start_y) = touch.y;
            id(tile_swipe_last_x) = touch.x;
            id(tile_swipe_last_y) = touch.y;
            id(tile_swipe_last_render_ms) = 0;

    on_update:
      then:
        - lambda: |-
            if (touches.empty()) {
              return;
            }
            const auto &touch = touches[0];

            if (!id(tile_swipe_tracking)) {
              return;
            }
            id(tile_swipe_last_x) = touch.x;
            id(tile_swipe_last_y) = touch.y;

            const int page = id(tile_swipe_page);
            if (page < 1 || page > 4 || id(ui_page) != page) {
              return;
            }

            const int dx = id(tile_swipe_last_x) - id(tile_swipe_start_x);
            const int dy = id(tile_swipe_last_y) - id(tile_swipe_start_y);
            const int abs_dx = abs(dx);
            const int abs_dy = abs(dy);
            if (!id(tile_swipe_dragging) && (abs_dx <= 24 || abs_dx <= abs_dy)) {
              return;
            }

            constexpr int width = 800;
            constexpr int commit_x = width / 4;
            int next_page = id(tile_swipe_next_page);
            int next_x = id(tile_swipe_next_x);
            int page_dx = dx;
            if (page_dx < -width) page_dx = -width;
            if (page_dx > width) page_dx = width;

            if (!id(tile_swipe_dragging)) {
              const int dir = page_dx < 0 ? 1 : -1;
              next_page = page + dir;
              if (next_page < 1 || next_page > 4) {
                return;
              }
              next_x = dir > 0 ? width : -width;

              lv_obj_t *current = nullptr;
              lv_obj_t *next = nullptr;
              switch (page) {
                case 1: current = id(controls_root_1); break;
                case 2: current = id(controls_root_2); break;
                case 3: current = id(controls_root_3); break;
                case 4: current = id(controls_root_4); break;
              }
              switch (next_page) {
                case 1: next = id(controls_root_1); break;
                case 2: next = id(controls_root_2); break;
                case 3: next = id(controls_root_3); break;
                case 4: next = id(controls_root_4); break;
              }
              if (current == nullptr || next == nullptr) {
                return;
              }

              lv_indev_wait_release(lv_indev_active());
              lvgl_esphome_snapshot_cache_pair(current, next, width);
              if (!lvgl_esphome_snapshot_swipe_begin(current, next, width, next_x)) {
                return;
              }

              id(tile_swipe_dragging) = true;
              id(tile_swipe_next_page) = next_page;
              id(tile_swipe_next_x) = next_x;
              if (id(settings_swipe_logs_switch).state) {
                ESP_LOGI("touch.snapshot", "begin page=%d next=%d next_x=%d", page, next_page, next_x);
              }
            }

            if (id(tile_swipe_last_render_ms) != 0 && millis() - id(tile_swipe_last_render_ms) < 12) {
              return;
            }
            id(tile_swipe_last_render_ms) = millis();

            if (next_x > 0 && page_dx > 0) page_dx = 0;
            if (next_x < 0 && page_dx < 0) page_dx = 0;
            if (abs(page_dx) >= commit_x) {
              id(tile_swipe_commit_latched) = true;
            }
            lvgl_esphome_snapshot_swipe_update(page_dx, next_x + page_dx);
    on_release:
      then:
        - lambda: |-
            if (!id(tile_swipe_tracking)) {
              return;
            }
            id(tile_swipe_tracking) = false;
            const int page = id(tile_swipe_page);
            const int next_page = id(tile_swipe_next_page);
            const int next_x = id(tile_swipe_next_x);
            const int dx = id(tile_swipe_last_x) - id(tile_swipe_start_x);
            const int dy = id(tile_swipe_last_y) - id(tile_swipe_start_y);
            const int abs_dx = abs(dx);
            const int abs_dy = abs(dy);
            constexpr int width = 800;
            constexpr int commit_x = width / 4;

            if (id(tile_swipe_dragging) && next_page >= 1 && next_page <= 4) {
              const bool commit = id(tile_swipe_commit_latched) || (abs_dx >= commit_x && abs_dx > abs_dy);
              const int final_current_x = commit ? (next_x > 0 ? -width : width) : 0;
              const int final_next_x = commit ? 0 : next_x;

              lvgl_esphome_snapshot_swipe_finish(final_current_x, final_next_x, 130, commit);
              id(ui_page) = commit ? next_page : page;
              id(ui_apply_tile_visibility).execute();
              if (id(settings_swipe_logs_switch).state) {
                ESP_LOGI("touch.snapshot", "finish page=%d next=%d commit=%d latched=%d dx=%d",
                         page, next_page, commit, id(tile_swipe_commit_latched), dx);
              }
            } else {
              lvgl_esphome_snapshot_swipe_end();
            }

            id(tile_swipe_dragging) = false;
            id(tile_swipe_page) = 0;
            id(tile_swipe_next_page) = 0;
            id(tile_swipe_next_x) = 0;
            id(tile_swipe_commit_latched) = false;
            id(tile_swipe_last_render_ms) = 0;
