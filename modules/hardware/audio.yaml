# Local audio pipeline and SendSpin transport.
# This keeps the amplifier, I2S codec, resampler and media_player entities in one hardware-oriented package.
switch:
  - platform: gpio
    id: pa_enable
    name: "Speaker Amplifier"
    pin: GPIO53
    restore_mode: ALWAYS_ON

sendspin:
  id: sendspin_hub
  task_stack_in_psram: true

i2s_audio:
  - id: audio_bus
    i2s_mclk_pin: GPIO13
    i2s_lrclk_pin: GPIO10
    i2s_bclk_pin: GPIO12

audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: touchscreen_bus
    address: 0x18

audio_adc:
  - platform: es7210
    id: es7210_adc
    i2c_id: touchscreen_bus
    address: 0x40
    bits_per_sample: 16bit
    sample_rate: 16000
    mic_gain: 30db

speaker:
  - platform: i2s_audio
    id: board_speaker
    i2s_audio_id: audio_bus
    i2s_dout_pin: GPIO9
    audio_dac: es8311_dac
    dac_type: external
    channel: stereo
    buffer_duration: 100ms
    bits_per_sample: 16bit
    sample_rate: 48000

  - platform: mixer
    id: audio_mixer
    output_speaker: board_speaker
    num_channels: 2
    queue_mode: true
    source_speakers:
      - id: media_mixing_input
        buffer_duration: 100ms
        timeout: never
      - id: assistant_mixing_input
        buffer_duration: 100ms
        timeout: never

  - platform: resampler
    id: media_speaker
    output_speaker: media_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

  - platform: resampler
    id: assistant_speaker
    output_speaker: assistant_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

media_source:
  - platform: audio_http
    id: http_announcement_source
    buffer_size: 250000

  - platform: sendspin
    id: sendspin_media_source
    sample_rate: 48000
    buffer_size: 600000
    task_stack_in_psram: true
    decode_memory: psram
    initial_static_delay: 250ms
    static_delay_adjustable: true

media_player:
  - platform: speaker_source
    id: local_music_player
    name: "Atmosfera Echo Hub Local Audio"
    volume_increment: 5%
    volume_initial: 50%
    announcement_pipeline:
      speaker: assistant_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1
      sources:
        - http_announcement_source
    media_pipeline:
      speaker: media_speaker
      sources:
        - sendspin_media_source
      format: FLAC
      sample_rate: 48000
      num_channels: 2
    on_announcement:
      - micro_wake_word.stop:
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0ms
    on_state:
      - if:
          condition:
            and:
              - switch.is_off: timer_ringing
              - not:
                  voice_assistant.is_running:
              - not:
                  media_player.is_announcing: local_music_player
          then:
            - mixer_speaker.apply_ducking:
                id: media_mixing_input
                decibel_reduction: 0
                duration: 1s

  - platform: sendspin
    id: sendspin_group
    name: "Sendspin Group"
    volume_increment: 5%
