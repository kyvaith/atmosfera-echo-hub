# ESP32-P4 board, hosted radio and memory tuning.
# Keep CPU, PSRAM, flash and SDIO choices together because they affect display and audio throughput.
esp32:
  board: esp32-p4-evboard
  flash_size: 32MB
  cpu_frequency: 360MHz
  engineering_sample: true
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true
      compiler_optimization: PERF
    sdkconfig_options:
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
      CONFIG_LWIP_MAX_SOCKETS: "12"
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "6144"
      CONFIG_ESP_TIMER_TASK_STACK_SIZE: "2048"
      CONFIG_SPIRAM_SPEED_200M: "y"
      CONFIG_SPIRAM_SPEED: "200"
      CONFIG_SPIRAM_USE_MALLOC: "y"
      # Keep early FreeRTOS/system allocations in internal RAM. The voice
      # stack adds TensorFlow/microWakeWord code, so reserve less internal
      # heap than the default 64 KB pool while still protecting DMA-only users.
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "16384"
      CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL: "32768"
      CONFIG_LV_DEF_REFR_PERIOD: "10"
      CONFIG_LV_USE_LOG: "0"
      # ESP32-P4 exposes Espressif's xespv extension, not standard RISC-V V.
      # LVGL's RISCV_V path falls back to software emulation here, so keep it off.
      CONFIG_LV_USE_DRAW_SW_ASM: "0"
      CONFIG_LV_PPA_BURST_LENGTH: "128"
      CONFIG_LV_DRAW_SW_SUPPORT_RGB888: "y"
      CONFIG_LV_DRAW_SW_SUPPORT_ARGB8888: "y"
      CONFIG_LV_DRAW_SW_SUPPORT_ARGB8888_PREMULTIPLIED: "y"
      # Keep DSI interrupt work and objects in internal memory. These are
      # normally selected by IDF already, but listing them keeps the display
      # latency assumptions explicit in this project.
      CONFIG_LCD_DSI_ISR_HANDLER_IN_IRAM: "y"
      CONFIG_LCD_DSI_OBJ_FORCE_INTERNAL: "y"
      CONFIG_ESP_IPC_ENABLE: "y"
      CONFIG_ESPTOOLPY_FLASHMODE_QIO: "y"
      CONFIG_PARTITION_TABLE_OFFSET: "0x9000"

esp32_hosted:
  type: sdio
  active_high: true
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  bus_width: 4
  sdio_frequency: 20MHz

psram:
  mode: hex
  speed: 200MHz

esp_ldo:
  - channel: 3
    voltage: 2.5V
