# ESP32-P4 board, hosted radio and memory tuning.
# Keep CPU, PSRAM, flash and SDIO choices together because they affect display and audio throughput.
esp32:
  board: esp32-p4-evboard
  flash_size: 32MB
  cpu_frequency: 360MHz
  engineering_sample: true
  framework:
    type: esp-idf
    version: 5.5.2
    platform_version: 55.03.35
    advanced:
      enable_idf_experimental_features: true
      compiler_optimization: PERF
    sdkconfig_options:
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_LWIP_MAX_SOCKETS: "20"
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "16384"
      CONFIG_ESP_TIMER_TASK_STACK_SIZE: "4096"
      CONFIG_ESP_TASK_LOOP_STACK_SIZE: "16384"
      CONFIG_SPIRAM_SPEED_200M: "y"
      CONFIG_SPIRAM_SPEED: "200"
      CONFIG_ESPTOOLPY_FLASHMODE_QIO: "y"
      CONFIG_PARTITION_TABLE_OFFSET: "0x9000"

esp32_hosted:
  type: sdio
  active_high: true
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  bus_width: 4
  sdio_frequency: 20MHz

psram:
  mode: hex
  speed: 200MHz

esp_ldo:
  - channel: 3
    voltage: 2.5V
