# Core ESPHome runtime and network integration.
# This file intentionally holds boot behavior, API, logging, Wi-Fi and the lightweight web server.
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  includes:
    - <esp_heap_caps.h>
    - <esp_psram.h>
    - <sdkconfig.h>
  project:
    name: "${project_namespace}.${friendly_name}"
    version: ${firmware_version}
  platformio_options:
    board_build.flash_mode: qio
  on_boot:
    priority: 600
    then:
      - switch.turn_on: pa_enable
      - light.turn_off:
          id: display_backlight
      - lvgl.page.show:
          id: boot_page
      - script.execute: ui_apply_settings_state
      - script.execute: log_memory_diagnostics
      - delay: 250ms
      - lambda: |-
          id(display_awake) = true;
          id(display_last_interaction_ms) = millis();
          float brightness_state = id(settings_display_brightness).state;
          bool used_fallback = false;
          if (!(brightness_state >= 5.0f && brightness_state <= 100.0f)) {
            brightness_state = ${display_brightness_default};
            used_fallback = true;
          }
          float brightness = brightness_state / 100.0f;
          if (used_fallback) {
            ESP_LOGW("display.boot", "Invalid restored brightness %.2f%%, using default %.2f%%",
                     id(settings_display_brightness).state, brightness_state);
          }
          auto call = id(display_backlight).turn_on();
          call.set_brightness(brightness);
          call.set_transition_length(2000);
          call.perform();
      - delay: 4s
      - script.execute: ui_show_tiles_1
      - lvgl.page.show:
          id: controls_page
      - lambda: |-
          id(boot_sequence_done) = true;
          id(display_awake) = true;
          id(display_last_interaction_ms) = millis();
      - script.execute: ui_apply_settings_state

ota:
  - platform: esphome

api:
  homeassistant_states: true
  on_client_connected:
    - lambda: |-
        if (client_info.find("Home Assistant") != std::string::npos) {
          id(ha_base_url) = client_address;
        }
    - script.execute: subscribe_media_player
    - script.execute: subscribe_speaker_group_sensor

time:
  - platform: homeassistant
    id: ha_time

logger:
  hardware_uart: UART0
  level: INFO
  initial_level: WARN

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none

# Disable web_server first if audio streaming or SDIO stability regresses.

web_server:
  port: 80
  version: 3
