# Core ESPHome runtime and network integration.
# This file intentionally holds boot behavior, API, logging, Wi-Fi and the lightweight web server.
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: ${esphome_min_version}
  project:
    name: "${project_namespace}.${friendly_name}"
    version: ${firmware_version}
  platformio_options:
    board_build.flash_mode: qio
  on_boot:
    priority: 600
    then:
      - switch.turn_on: pa_enable
      - light.turn_off:
          id: display_backlight
      - lvgl.page.show:
          id: boot_page
      - script.execute: ui_apply_settings_state
      - script.execute: log_memory_diagnostics
      - delay: 250ms
      - globals.set:
          id: display_awake
          value: 'true'
      - globals.set:
          id: display_last_interaction_ms
          value: !lambda 'return millis();'
      - light.turn_on:
          id: display_backlight
          brightness: !lambda 'return id(settings_display_brightness).state / 100.0f;'
          transition_length: 2s
      - delay: 4s
      - script.execute: ui_show_tiles_1
      - lvgl.page.show:
          id: controls_page
      - globals.set:
          id: boot_sequence_done
          value: 'true'
      - globals.set:
          id: display_awake
          value: 'true'
      - globals.set:
          id: display_last_interaction_ms
          value: !lambda 'return millis();'
      - script.execute: ui_apply_settings_state

ota:
  - platform: esphome

api:
  homeassistant_states: true
  on_client_connected:
    - lambda: |-
        if (client_info.find("Home Assistant") != std::string::npos) {
          id(ha_base_url) = client_address;
        }
    - script.execute: subscribe_media_player
    - script.execute: subscribe_speaker_group_sensor

time:
  - platform: homeassistant
    id: ha_time

logger:
  hardware_uart: UART0
  level: INFO
  initial_level: WARN

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none

# Disable web_server first if audio streaming or SDIO stability regresses.

web_server:
  port: 80
  version: 3
