# Device-level runtime settings.
# These entities are exposed in Home Assistant and mirrored where practical on the round settings page.
globals:
  - id: boot_sequence_done
    type: bool
    restore_value: no
    initial_value: 'false'

script:
  - id: display_wake
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(boot_sequence_done);'
          then:
            - light.turn_on:
                id: display_backlight
                brightness: !lambda 'return id(settings_display_brightness).state / 100.0f;'
                transition_length: 250ms

switch:
  - platform: template
    id: settings_beta_firmware_switch
    name: "Beta Firmware"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    disabled_by_default: true
    icon: "mdi:test-tube"
    on_turn_on:
      - logger.log:
          level: INFO
          tag: firmware
          format: "OTA updates set to beta channel"
      - lambda: 'id(firmware_update).set_source_url("${firmware_manifest_beta_url}");'
      - component.update: firmware_update
      - script.execute: ui_update_beta_firmware_state
    on_turn_off:
      - logger.log:
          level: INFO
          tag: firmware
          format: "OTA updates set to stable channel"
      - lambda: 'id(firmware_update).set_source_url("${firmware_manifest_url}");'
      - component.update: firmware_update
      - script.execute: ui_update_beta_firmware_state
  - platform: template
    id: settings_true_colour_switch
    name: "True Colour Mode"
    optimistic: true
    restore_mode: ALWAYS_ON
    on_turn_on:
      - script.execute: ui_update_true_colour_state
    on_turn_off:
      - switch.turn_on: settings_true_colour_switch
      - script.execute: ui_update_true_colour_state
  - platform: template
    id: settings_screen_tone_switch
    name: "Screen Tone"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - script.execute: ui_update_screen_tone_state
    on_turn_off:
      - script.execute: ui_update_screen_tone_state
  - platform: template
    id: settings_perf_overlay_switch
    name: "Performance Overlay"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - script.execute: ui_update_perf_overlay_state
    on_turn_off:
      - script.execute: ui_update_perf_overlay_state
  - platform: template
    id: settings_system_logs_switch
    name: "System Logs"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - logger.set_level: INFO
      - script.execute: ui_update_system_logs_state
    on_turn_off:
      - logger.set_level: WARN
      - script.execute: ui_update_system_logs_state
  - platform: template
    id: settings_perf_logs_switch
    name: "Performance Logs"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - script.execute: ui_update_perf_logs_state
    on_turn_off:
      - script.execute: ui_update_perf_logs_state
  - platform: template
    id: settings_swipe_logs_switch
    name: "Swipe Debug Logs"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - script.execute: ui_update_swipe_logs_state
    on_turn_off:
      - script.execute: ui_update_swipe_logs_state

number:
  - platform: template
    id: settings_display_brightness
    name: "Display Brightness"
    min_value: 5
    max_value: 100
    step: 5
    initial_value: 85
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    icon: "mdi:brightness-6"
    entity_category: config
    mode: slider
    on_value:
      - script.execute: ui_update_display_brightness_state
      - if:
          condition:
            and:
              - lambda: 'return id(boot_sequence_done);'
              - light.is_on: display_backlight
          then:
            - light.turn_on:
                id: display_backlight
                brightness: !lambda 'return id(settings_display_brightness).state / 100.0f;'
                transition_length: 250ms

  - platform: template
    id: settings_display_timeout
    name: "Display Timeout"
    min_value: 0
    max_value: 300
    step: 15
    initial_value: 60
    optimistic: true
    restore_value: true
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"
    entity_category: config
    mode: box
    on_value:
      - script.execute: ui_update_display_timeout_state

