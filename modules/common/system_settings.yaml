# Device-level runtime settings.
# These entities are exposed in Home Assistant and mirrored where practical on the round settings page.
globals:
  - id: boot_sequence_done
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: display_awake
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: display_last_interaction_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

script:
  - id: display_apply_brightness
    mode: restart
    then:
      - lambda: |-
          if (!id(boot_sequence_done) || !id(display_awake)) return;
          float brightness = id(settings_display_brightness).state / 100.0f;
          if (brightness < 0.01f) brightness = 0.01f;
          if (brightness > 1.0f) brightness = 1.0f;
          auto call = id(display_backlight).turn_on();
          call.set_brightness(brightness);
          call.set_transition_length(250);
          call.perform();

  - id: display_wake
    mode: restart
    then:
      - lambda: |-
          id(display_last_interaction_ms) = millis();
          if (!id(boot_sequence_done)) return;
          id(display_awake) = true;
          float brightness = id(settings_display_brightness).state / 100.0f;
          if (brightness < 0.01f) brightness = 0.01f;
          if (brightness > 1.0f) brightness = 1.0f;
          auto call = id(display_backlight).turn_on();
          call.set_brightness(brightness);
          call.set_transition_length(250);
          call.perform();

  - id: display_sleep
    mode: restart
    then:
      - lambda: |-
          if (!id(boot_sequence_done) || !id(display_awake)) return;
          id(display_awake) = false;
          auto call = id(display_backlight).turn_off();
          call.set_transition_length(500);
          call.perform();

interval:
  - interval: 1s
    then:
      - lambda: |-
          if (!id(boot_sequence_done) || !id(display_awake)) return;
          float timeout_s = id(settings_display_timeout).state;
          if (timeout_s <= 0.0f) return;
          const uint32_t elapsed = millis() - id(display_last_interaction_ms);
          if (elapsed >= (uint32_t)(timeout_s * 1000.0f)) {
            id(display_sleep).execute();
          }

switch:
  - platform: template
    id: settings_beta_firmware_switch
    name: "Beta Firmware"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    disabled_by_default: true
    icon: "mdi:test-tube"
    on_turn_on:
      - logger.log:
          level: INFO
          tag: firmware
          format: "OTA updates set to beta channel"
      - lambda: 'id(firmware_update).set_source_url("${firmware_manifest_beta_url}");'
      - component.update: firmware_update
      - script.execute: ui_apply_settings_state
    on_turn_off:
      - logger.log:
          level: INFO
          tag: firmware
          format: "OTA updates set to stable channel"
      - lambda: 'id(firmware_update).set_source_url("${firmware_manifest_url}");'
      - component.update: firmware_update
      - script.execute: ui_apply_settings_state
  - platform: template
    id: settings_true_colour_switch
    name: "True Colour Mode"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: ui_apply_settings_state
    on_turn_off:
      - script.execute: ui_apply_settings_state
  - platform: template
    id: settings_screen_tone_switch
    name: "Screen Tone"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
