    name: "Performance Overlay"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - script.execute: ui_apply_settings_state
    on_turn_off:
      - script.execute: ui_apply_settings_state
  - platform: template
    id: settings_system_logs_switch
    name: "System Logs"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - logger.set_level: INFO
      - script.execute: ui_apply_settings_state
    on_turn_off:
      - logger.set_level: WARN
      - script.execute: ui_apply_settings_state
  - platform: template
    id: settings_perf_logs_switch
