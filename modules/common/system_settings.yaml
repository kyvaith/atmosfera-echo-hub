number:
  - platform: template
    id: settings_display_brightness
    name: "Display Brightness"
    min_value: 5
    max_value: 100
    step: 5
    initial_value: ${display_brightness_default}
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"
    icon: "mdi:brightness-6"
    entity_category: config
    mode: slider
    on_value:
      - script.execute: ui_apply_settings_state
      - script.execute: display_apply_brightness

  - platform: template
    id: settings_display_timeout
    name: "Display Timeout"
    min_value: 0
    max_value: 300
    step: 15
    initial_value: ${display_timeout_default}
    optimistic: true
    restore_value: true
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"
    entity_category: config
    mode: box
    on_value:
      - script.execute: ui_apply_settings_state

